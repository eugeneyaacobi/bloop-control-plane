services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bloop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bloop}
      POSTGRES_DB: ${POSTGRES_DB:-bloop_control_plane}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bloop} -d ${POSTGRES_DB:-bloop_control_plane}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "38025:8025"

  control-plane:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://bloop:bloop@postgres:5432/bloop_control_plane?sslmode=disable}
      LISTEN_ADDR: ${LISTEN_ADDR:-:8081}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@bloop.to}
      VERIFICATION_TOKEN_TTL_SECONDS: ${VERIFICATION_TOKEN_TTL_SECONDS:-3600}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-bloop_session}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-604800}
      PROTOTYPE_MODE: "false"
      ALLOW_DEV_AUTH_FALLBACK: "false"
      RUNTIME_INGEST_SECRET: ${RUNTIME_INGEST_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    ports:
      - "38081:8081"

  frontend:
    build:
      context: /root/.openclaw/worktree-bloop-frontend-integration
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      CONTROL_PLANE_BASE_URL: ${CONTROL_PLANE_BASE_URL:-http://control-plane:8081}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      control-plane:
        condition: service_started
    ports:
      - "33000:3000"

volumes:
  pgdata:
