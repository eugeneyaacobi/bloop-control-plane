services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: bloop
      POSTGRES_PASSWORD: bloop
      POSTGRES_DB: bloop_control_plane
    ports:
      - "35432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloop -d bloop_control_plane"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "38025:8025"
      - "31025:1025"

  control-plane:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    environment:
      DATABASE_URL: postgres://bloop:bloop@postgres:5432/bloop_control_plane?sslmode=disable
      LISTEN_ADDR: :8081
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_FROM: noreply@bloop.to
      VERIFICATION_TOKEN_TTL_SECONDS: 3600
      SESSION_SECRET: dev-full-stack-session-secret
      RUNTIME_INGEST_SECRET: dev-full-stack-runtime-secret
      ALLOW_DEV_AUTH_FALLBACK: "true"
      PROTOTYPE_MODE: "true"
    ports:
      - "38081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started

volumes:
  pgdata:
